name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      # The compositor's seat keyboard compiles an xkb keymap, so the Wayland
      # stack links libxkbcommon (and pulls its keymap data). The rest of the
      # Wayland server is pure Rust.
      - run: sudo apt-get update && sudo apt-get install -y libxkbcommon-dev
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets -- -D warnings
      # Let the cells confinement tests actually run unprivileged user
      # namespaces; Ubuntu restricts these by default. Harmless where the knob
      # is absent, and the tests skip themselves if it stays off.
      - run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
      - run: cargo test --all
